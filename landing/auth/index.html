<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ollama - Sign Up</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 420px;
      padding: 40px;
    }
    .logo {
      text-align: center;
      margin-bottom: 30px;
    }
    .logo h1 {
      font-size: 24px;
      color: #61afef;
      margin-bottom: 10px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s;
    }
    input:focus {
      outline: none;
      border-color: #61afef;
      box-shadow: 0 0 0 3px rgba(97, 175, 239, 0.1);
    }
    .btn {
      width: 100%;
      padding: 12px 16px;
      background: #61afef;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 10px;
    }
    .btn:hover { background: #56b6c2; }
    .btn:active { opacity: 0.9; }
    .divider {
      margin: 20px 0;
      display: flex;
      align-items: center;
      color: #999;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e0e0e0;
    }
    .divider::before { margin-right: 10px; }
    .divider::after { margin-left: 10px; }
    .toggle-tab {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      background: #f5f5f5;
      padding: 4px;
      border-radius: 8px;
    }
    .toggle-tab button {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-weight: 600;
      color: #999;
      border-radius: 6px;
      transition: all 0.3s;
    }
    .toggle-tab button.active {
      background: white;
      color: #61afef;
    }
    .form-section { display: none; }
    .form-section.active { display: block; }
    .error {
      padding: 12px;
      background: #fee;
      color: #c33;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 15px;
    }
    .success {
      padding: 12px;
      background: #efe;
      color: #3a3;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 15px;
    }
    .link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #666;
    }
    .link a {
      color: #61afef;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>🚀 Ollama</h1>
      <p style="color: #999; font-size: 14px;">GPU-Accelerated Code Completion</p>
    </div>

    <div class="toggle-tab">
      <button class="active" onclick="toggleTab('signup')">Sign Up</button>
      <button onclick="toggleTab('login')">Log In</button>
    </div>

    <!-- Sign Up -->
    <div id="signup" class="form-section active">
      <form onsubmit="handleSignup(event)">
        <div id="signup-error"></div>
        <div id="signup-success"></div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="signup-email" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signup-password" placeholder="At least 8 characters" minlength="8" required>
        </div>

        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="signup-confirm" placeholder="Confirm your password" required>
        </div>

        <button type="submit" class="btn">Create Account</button>
      </form>
    </div>

    <!-- Log In -->
    <div id="login" class="form-section">
      <form onsubmit="handleLogin(event)">
        <div id="login-error"></div>
        <div id="login-success"></div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="login-email" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="Your password" required>
        </div>

        <button type="submit" class="btn">Sign In</button>
      </form>
    </div>

    <div class="link">
      Need help? <a href="https://github.com/alejandrodelarocha/vscode-ollama-fork">View docs</a>
    </div>
  </div>

  <script>
    const API_BASE = 'https://license.rochastudios.ai';

    function toggleTab(tab) {
      document.querySelectorAll('.toggle-tab button').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById(tab).classList.add('active');
    }

    async function handleSignup(e) {
      e.preventDefault();
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;
      const confirm = document.getElementById('signup-confirm').value;
      const errorEl = document.getElementById('signup-error');
      const successEl = document.getElementById('signup-success');

      errorEl.innerHTML = '';
      successEl.innerHTML = '';

      if (password !== confirm) {
        errorEl.innerHTML = '<div class="error">Passwords do not match</div>';
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/api/auth/signup`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          errorEl.innerHTML = `<div class="error">${data.error || 'Signup failed'}</div>`;
          return;
        }

        localStorage.setItem('token', data.token);
        successEl.innerHTML = '<div class="success">✓ Account created! Redirecting...</div>';
        setTimeout(() => window.location.href = '/plans', 2000);
      } catch (err) {
        errorEl.innerHTML = `<div class="error">Network error: ${err.message}</div>`;
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const errorEl = document.getElementById('login-error');
      const successEl = document.getElementById('login-success');

      errorEl.innerHTML = '';
      successEl.innerHTML = '';

      try {
        const res = await fetch(`${API_BASE}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          errorEl.innerHTML = `<div class="error">${data.error || 'Login failed'}</div>`;
          return;
        }

        localStorage.setItem('token', data.token);
        successEl.innerHTML = '<div class="success">✓ Signed in! Redirecting...</div>';
        setTimeout(() => window.location.href = '/dashboard', 2000);
      } catch (err) {
        errorEl.innerHTML = `<div class="error">Network error: ${err.message}</div>`;
      }
    }
  </script>
</body>
</html>
