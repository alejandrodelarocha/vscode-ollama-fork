<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ollama Voice Assistant</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #282c34 0%, #1e2228 100%);
      color: #abb2bf;
    }

    .container {
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 1px solid #3e4451;
      padding-bottom: 15px;
    }

    .logo {
      width: 32px;
      height: 32px;
      margin-right: 10px;
      background: linear-gradient(135deg, #61afef 0%, #56b6c2 100%);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: white;
      font-size: 14px;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      color: #e5c07b;
    }

    .status {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
      padding: 12px;
      background: rgba(97, 175, 239, 0.1);
      border-left: 3px solid #61afef;
      border-radius: 4px;
      font-size: 13px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #98c379;
      margin-right: 8px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #61afef 0%, #56b6c2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(97, 175, 239, 0.3);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-primary.recording {
      background: linear-gradient(135deg, #e06c75 0%, #d19a66 100%);
      animation: pulse 0.5s infinite;
    }

    .btn-secondary {
      background: #3e4451;
      color: #abb2bf;
    }

    .btn-secondary:hover {
      background: #495162;
    }

    .transcript {
      background: #1e2228;
      border: 1px solid #3e4451;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 15px;
      min-height: 60px;
      font-size: 13px;
      line-height: 1.4;
      max-height: 150px;
      overflow-y: auto;
      color: #c0caf5;
    }

    .transcript.empty {
      color: #6272a4;
      font-style: italic;
    }

    .commands-list {
      background: #1e2228;
      border: 1px solid #3e4451;
      border-radius: 6px;
      padding: 12px;
      font-size: 12px;
      max-height: 200px;
      overflow-y: auto;
    }

    .commands-list h3 {
      font-size: 12px;
      color: #e5c07b;
      margin-bottom: 8px;
    }

    .command-item {
      padding: 6px;
      color: #abb2bf;
      border-bottom: 1px solid #3e4451;
    }

    .command-item:last-child {
      border-bottom: none;
    }

    .command-item code {
      background: rgba(97, 175, 239, 0.1);
      color: #61afef;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 11px;
    }

    .settings {
      display: flex;
      gap: 8px;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #3e4451;
    }

    .settings button {
      flex: 1;
      padding: 8px 12px;
      font-size: 12px;
    }

    .mic-icon {
      width: 20px;
      height: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">OA</div>
      <h1>Ollama Voice</h1>
    </div>

    <div class="status">
      <div class="status-dot"></div>
      <span id="statusText">Ready to listen</span>
    </div>

    <div class="controls">
      <button class="btn-primary" id="startBtn">
        <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 1a3 3 0 0 0-3 3v12a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
          <line x1="12" y1="19" x2="12" y2="23"></line>
          <line x1="8" y1="23" x2="16" y2="23"></line>
        </svg>
        Start Listening
      </button>
      <button class="btn-secondary" id="stopBtn" style="display: none;">
        Stop Listening
      </button>
    </div>

    <div class="transcript empty" id="transcript">
      Listening for voice input...
    </div>

    <div class="commands-list">
      <h3>Voice Commands</h3>
      <div class="command-item"><code>code [text]</code> - Insert code</div>
      <div class="command-item"><code>complete</code> - Request completion</div>
      <div class="command-item"><code>toggle ollama</code> - Enable/disable</div>
      <div class="command-item"><code>check status</code> - Check connection</div>
      <div class="command-item"><code>qa</code> - Toggle quality analysis</div>
    </div>

    <div class="settings">
      <button class="btn-secondary" id="settingsBtn" style="flex: 1;">⚙️ Settings</button>
      <button class="btn-secondary" id="helpBtn" style="flex: 1;">❓ Help</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
